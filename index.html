<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <h1>online forth</h1>
    </head>
    <body>
        <div>
            <textarea readonly id="output"></textarea>
            <input type="text" id="command" placeholder="command">
            <button id="send_bt">send</button>
        </div>
    </body>
</html>
<script>
    const console = document.getElementById("output");
    const command = document.getElementById("command");
    const sendbutton = document.getElementById("send_bt");
    let console_text = "";
    let steck = [];
    function update() {
        console.value = console_text;
        command.value = "";
    }
    function print_steck() {console_text = console_text + steck + "\n";}
    sendbutton.addEventListener("click", function() {
        if (command.value == ".s"){
            console_text = console_text + steck + "\n";
            update();
        }else if (command.value == "drop"){
            steck = steck.slice(0, -1);
            update();
        }else if (isNaN(command.value) == false && command.value != "") {
            steck.push(command.value);
            update();
        }else if (command.value == "swap") {
            let firs = steck[0];
            let final = steck[steck.length - 1];

            steck[steck.length -1] = firs;
            steck[0] = final;
            update();

        }else if (command.value == "over") {
            let firs = steck[0];
            for (let x = 1; x < steck.length; x++){
                steck[x-1] = steck[x]; 
            }
            steck[steck.length -1] = firs;
            update();

        }else if (command.value == "dup") {
            steck.push(steck[steck.length - 1]);
            update();
        }else {
            console_text = console_text + "error" + "\n";
            update();
        }
    });

</script>
