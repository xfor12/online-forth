<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <h1>online forth</h1>
    </head>
    <body>
        <div>
            <textarea readonly id="output"></textarea>
            <input type="text" id="command" placeholder="command">
            <button id="send_bt">send</button>
        </div>
    </body>
</html>
<script>
    const console = document.getElementById("output");
    const command = document.getElementById("command");
    const sendbutton = document.getElementById("send_bt");
    let console_text = "";
    let steck = [];
    function update() {
        console.value = console_text;
        command.value = "";
    }
    function print_steck() {console_text = console_text + steck + "\n";}
    sendbutton.addEventListener("click", function() {
        if (command.value == ".s"){
            update();
            print_steck();
        }else if (command.value == "drop"){
            steck = steck.slice(0, -1);
            update();
            print_steck();
        }else {
            steck.push(command.value);
            update();
        }
    });

</script>
